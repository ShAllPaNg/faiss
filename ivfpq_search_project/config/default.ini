# ==============================================
# IndexIVFPQ Vector Search Configuration File
# ==============================================
# 说明: 此配置文件用于IndexIVFPQ向量检索系统的参数配置
# 修改配置后需重启程序生效

[vector]
# 向量维度 (推荐: 64, 128, 256)
dimension = 128

# 库向量数量 (用于测试)
database_count = 100000

# query向量数量
query_count = 100

# 训练集向量数量 (通常为数据库的10%-50%，或至少nlist×M)
train_count = 50000

# 向量分布类型: uniform, normal, orthogonal
distribution = uniform

# 数值范围 (uniform分布时使用)
min_val = -1.0
max_val = 1.0

# 均值和标准差 (normal分布时使用)
mean = 0.0
std = 1.0

[index]
# IVF倒排列表数量 (建议: sqrt(database_count) 或更大)
nlist = 316

# PQ子量化器数量 (dimension必须能被M整除)
M = 16

# 每个子量化器位数 (推荐: 8, 每个子量化器256个质心)
nbits = 8

# 距离度量类型: L2, INNER_PRODUCT
metric = L2

# 搜索时探测的桶数 (建议: nlist/10 到 nlist/2)
nprobe = 16

# 是否使用残差量化 (推荐: true)
by_residual = true

# 是否使用预计算表 (内存消耗大，速度更快)
use_precomputed_table = false

[search]
# 初筛返回top-k结果 (用于重排序)
topk = 100

# 重排序后最终返回数量
final_topk = 10

# 并发线程数 (0表示自动检测CPU核心数)
nthread = 0

# 是否启用重排序
enable_re_rank = true

[path]
# 训练集向量路径
train_vectors_path = data/raw_vectors/train_vectors.fvec

# 库向量路径
database_vectors_path = data/raw_vectors/database_vectors.fvec

# query向量路径
query_vectors_path = data/raw_vectors/query_vectors.fvec

# IndexIVFPQ索引保存路径
index_path = data/index/ivfpq_index.faiss

# 搜索结果输出路径
result_path = data/results/search_results.txt

[advanced]
# 输出日志级别: 0=ERROR, 1=WARN, 2=INFO, 3=DEBUG
log_level = 2
