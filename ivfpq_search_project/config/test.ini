# ==============================================
# Small Test Configuration
# ==============================================

[vector]
dimension = 128
database_count = 10000
query_count = 10
train_count = 5000
distribution = uniform
min_val = -1.0
max_val = 1.0

[index]
nlist = 50
M = 32
nbits = 8
metric = L2
nprobe = 5
by_residual = true
use_precomputed_table = false

[search]
topk = 50
final_topk = 10
nthread = 0
enable_re_rank = true

[path]
train_vectors_path = data/raw_vectors/train_vectors.fvec
database_vectors_path = data/raw_vectors/database_vectors.fvec
query_vectors_path = data/raw_vectors/query_vectors.fvec
index_path = data/index/ivfpq_index.faiss
result_path = data/results/search_results.txt

[advanced]
log_level = 2
